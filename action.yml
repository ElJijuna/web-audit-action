name: 'Web Audit Report'
description: 'Generates a web audit report using npm audit (or equivalent) and publishes it'
author: 'ElJijuna'
branding:
  icon: 'bar-chart'
  color: 'blue'
inputs:
  runtime:
    description: 'Package manager: npm | bun | pnpm | yarn'
    required: false
    default: 'npm'
  token:
    description: 'Token to push to the destination repository (MonitoringTool-DB)'
    required: true
  db_repo:
    description: 'Name of the destination repository (owned by the same account as the consumer repo) that reports are pushed to'
    required: false
    default: 'MonitoringTool-DB'
runs:
  using: 'composite'
  steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🏷️ Set report name
      shell: bash
      run: echo "REPORT_NAME=GH-${{ github.repository_owner }}-${{ github.event.repository.name }}" >> "$GITHUB_ENV"

    - name: 🔧 Install dependencies
      run: |
        if [ "${{ inputs.runtime }}" = "npm" ]; then
          npm ci
        elif [ "${{ inputs.runtime }}" = "bun" ]; then
          bun install
        elif [ "${{ inputs.runtime }}" = "pnpm" ]; then
          pnpm install
        elif [ "${{ inputs.runtime }}" = "yarn" ]; then
          yarn install
        else
          echo "Invalid runtime: ${{ inputs.runtime }}"
          exit 1
        fi
      shell: bash

    - name: 🧨 Run audit script
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL https://raw.githubusercontent.com/ElJijuna/Bash-Scripts/refs/heads/main/web-audit-report.sh | bash -s ${{ inputs.runtime }} ${{ env.REPORT_NAME }}

    - name: 📂 Verify repo contents
      shell: bash
      run: ls -l

    - name: 📦 Upload report
      uses: actions/upload-artifact@v4
      with:
        name: audit-report
        path: ${{ env.REPORT_NAME }}--web-audit.json

    - name: ⚠️ Skip publish (no token)
      if: ${{ inputs.token == '' }}
      shell: bash
      run: echo "::notice::No 'token' input provided — skipping publish to ${{ inputs.db_repo }}. Report was generated and uploaded as a workflow artifact only."

    - name: 📥 Clone destination repository
      if: ${{ inputs.token != '' }}
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git clone --depth 1 https://x-access-token:${{ inputs.token }}@github.com/${{ github.repository_owner }}/${{ inputs.db_repo }}.git monitoring

    - name: 📥 Download artifact
      if: ${{ inputs.token != '' }}
      uses: actions/download-artifact@v4
      with:
        name: audit-report
        path: ./monitoring

    - name: ✅ Commit & Push
      if: ${{ inputs.token != '' }}
      shell: bash
      run: |
        cd monitoring
        git add .
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "📊 Update audit report"
          git pull --rebase
          git push
        fi
