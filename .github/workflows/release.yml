name: Release

on:
  workflow_run:
    workflows: ["Test Action"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          set -e

          last_tag=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)
          if [ -z "$last_tag" ]; then
            last_tag="v0.0.0"
          fi

          if git rev-parse "$last_tag" >/dev/null 2>&1 && \
             [ "$(git rev-list -n1 "$last_tag")" = "$(git rev-parse HEAD)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse "$last_tag" >/dev/null 2>&1; then
            range="${last_tag}..HEAD"
          else
            range="HEAD"
          fi
          log=$(git log "$range" --pretty=%s)

          bump=patch
          if echo "$log" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:|BREAKING CHANGE'; then
            bump=major
          elif echo "$log" | grep -qE '^feat(\([^)]*\))?:'; then
            bump=minor
          fi

          version="${last_tag#v}"
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)

          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "major_tag=v${major}" >> "$GITHUB_OUTPUT"

      - name: Tag release
        if: steps.version.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.new_tag }}"
          git tag -f "${{ steps.version.outputs.major_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.major_tag }}" --force

      - name: Create GitHub release
        if: steps.version.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.new_tag }}" \
            --title "${{ steps.version.outputs.new_tag }}" \
            --generate-notes
